manifest_version: 1
seam_id: deer-to-rerum
provider_service:
  name: rerum_server_nodejs
  repo: CenterForDigitalHumanities/rerum_server_nodejs
middleware_service:
  name: none
  repo: none
consumer_service:
  name: DEER
  repo: CenterForDigitalHumanities/deer
openapi_source:
  type: inline
  location: seams/deer-to-rerum/openapi/baseline.openapi.yaml
pact_broker_subjects:
  provider: rerum_server_nodejs
  consumer: DEER
verification_gates:
  - openapi-lint
  - openapi-breaking-change
  - pact-provider-verification
environments:
  - dev
  - stage
  - prod
environment_gate_mode:
  dev: advisory
  stage: blocking
  prod: blocking
versioning_policy:
  channel_tags:
    - alpha
    - stable
  compatibility_rule: additive-only-until-approved-breaking-change
owners:
  contract_owner: CenterForDigitalHumanities/Administrators
  verifier_owner: CenterForDigitalHumanities/Administrators
  release_approver: CenterForDigitalHumanities/devs
deprecation_policy:
  min_notice_days: 30
  require_migration_notes: true
test_endpoint_contract:
  health_endpoint: /health
  readiness_endpoint: /ready
  spec_endpoint: /openapi.json
  fixture_strategy: deterministic-seeded-data
