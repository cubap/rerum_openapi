manifest_version: 1
seam_id: tpen-interfaces-to-tpen-services
provider_service:
  name: TPEN-services
  repo: CenterForDigitalHumanities/TPEN-services
middleware_service:
  name: none
  repo: none
consumer_service:
  name: TPEN-interfaces
  repo: CenterForDigitalHumanities/TPEN-interfaces
openapi_source:
  type: inline
  location: seams/tpen-interfaces-to-tpen-services/openapi/baseline.openapi.yaml
pact_broker_subjects:
  provider: TPEN-services
  consumer: TPEN-interfaces
verification_gates:
  - openapi-lint
  - openapi-breaking-change
  - pact-provider-verification
environments:
  - dev
  - stage
  - prod
environment_gate_mode:
  dev: advisory
  stage: blocking
  prod: blocking
versioning_policy:
  channel_tags:
    - alpha
    - stable
  compatibility_rule: additive-only-until-approved-breaking-change
owners:
  contract_owner: CenterForDigitalHumanities/Administrators
  verifier_owner: CenterForDigitalHumanities/Administrators
  release_approver: CenterForDigitalHumanities/devs
deprecation_policy:
  min_notice_days: 30
  require_migration_notes: true
test_endpoint_contract:
  health_endpoint: /health
  readiness_endpoint: /ready
  spec_endpoint: /openapi.json
  fixture_strategy: deterministic-seeded-data
